name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "card-test/**"
      - "Cardio.xcodeproj/**"
      - ".github/workflows/build-ios.yml"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Cardio.xcodeproj \
            -scheme Cardio

      - name: Build app (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project Cardio.xcodeproj \
            -scheme Cardio \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee xcodebuild.log

      - name: Surface xcodebuild errors
        if: failure()
        run: |
          echo "Collecting xcodebuild error lines..."
          ERR_LINES="$(grep -E "error:|fatal error:" xcodebuild.log | tail -n 40 || true)"
          if [ -z "$ERR_LINES" ]; then
            echo "::error::Build failed with exit code 65, but no explicit 'error:' line was found in xcodebuild.log"
            tail -n 120 xcodebuild.log || true
            exit 1
          fi

          echo "$ERR_LINES"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::error::$line"
          done <<< "$ERR_LINES"

          exit 1

      - name: Package IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Cardio.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build -maxdepth 5 -type d -name "*.app" || true
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry Cardio-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardio-unsigned-ipa
          path: Cardio-unsigned.ipa

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cardio-build-logs
          path: xcodebuild.log
